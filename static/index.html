<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>洞天福地 · Hidden</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
  --border: #30363d; --text: #c9d1d9; --muted: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --purple: #bc8cff;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; min-height: 100vh; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Sidebar ── */
#sidebar {
  width: 220px; min-height: 100vh; background: var(--surface);
  border-right: 1px solid var(--border); position: fixed; top: 0; left: 0;
  display: flex; flex-direction: column; z-index: 100;
}
#sidebar .brand {
  padding: 20px 18px 14px; font-size: 1.1rem; font-weight: 700;
  color: var(--blue); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
#sidebar .nav-link {
  color: var(--muted); padding: 10px 18px; border-radius: 0;
  display: flex; align-items: center; gap: 10px; font-size: 0.9rem;
  transition: background .15s, color .15s;
}
#sidebar .nav-link:hover { background: var(--surface2); color: var(--text); }
#sidebar .nav-link.active { background: rgba(88,166,255,.12); color: var(--blue); border-left: 2px solid var(--blue); }
#sidebar .nav-link i { font-size: 1rem; width: 18px; }
#sidebar .version { padding: 12px 18px; font-size: 0.75rem; color: var(--muted); margin-top: auto; border-top: 1px solid var(--border); }

/* ── Main ── */
#main { margin-left: 220px; padding: 24px 28px; min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }

/* ── Components ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.card-header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 12px 16px; font-weight: 600; font-size: 0.9rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.stat-card .num { font-size: 2rem; font-weight: 700; line-height: 1; }
.stat-card .label { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
th { color: var(--muted); font-weight: 500; font-size: 0.8rem; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid rgba(48,54,61,.5); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(28,33,40,.6); }
.badge-active { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
.badge-inactive { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
.badge-pending { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.3); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
.badge-completed { background: rgba(88,166,255,.15); color: var(--blue); border: 1px solid rgba(88,166,255,.3); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }
.badge-failed { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; }

/* ── Forms ── */
.form-control, .form-select {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 8px 12px; font-size: 0.875rem; width: 100%;
}
.form-control:focus, .form-select:focus {
  outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(88,166,255,.15);
  background: var(--surface2); color: var(--text);
}
.form-control::placeholder { color: var(--muted); }
.form-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; display: block; }
.btn-primary { background: var(--blue); border: none; color: #fff; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 0.875rem; transition: opacity .15s; }
.btn-primary:hover { opacity: .85; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-sm-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; border-radius: 5px; cursor: pointer; font-size: 0.78rem; transition: all .15s; }
.btn-sm-ghost:hover { border-color: var(--blue); color: var(--blue); }
.btn-sm-danger { background: transparent; border: 1px solid rgba(248,81,73,.4); color: var(--red); padding: 3px 10px; border-radius: 5px; cursor: pointer; font-size: 0.78rem; transition: all .15s; }
.btn-sm-danger:hover { background: rgba(248,81,73,.1); }

/* ── Toast ── */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast-msg { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 0.875rem; min-width: 240px; animation: slideIn .2s ease; }
.toast-msg.success { border-left: 3px solid var(--green); }
.toast-msg.error { border-left: 3px solid var(--red); }
.toast-msg.info { border-left: 3px solid var(--blue); }
@keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

/* ── Resource cards ── */
.resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
.res-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color .15s, transform .15s; }
.res-card:hover { border-color: var(--blue); transform: translateY(-2px); }
.res-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--surface2); }
.res-poster-ph { width: 100%; aspect-ratio: 2/3; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 2rem; }
.res-info { padding: 10px; }
.res-title { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-meta { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

/* ── Page header ── */
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.page-header h1 { font-size: 1.3rem; font-weight: 700; margin: 0; }

/* ── Settings ── */
.settings-group { margin-bottom: 28px; }
.settings-group-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

/* ── Pagination ── */
.pager { display: flex; gap: 6px; margin-top: 16px; align-items: center; }
.pager button { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
.pager button:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
.pager button:disabled { opacity: .4; cursor: not-allowed; }
.pager .page-info { color: var(--muted); font-size: 0.8rem; }

/* ── Spinner ── */
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 24px; position: relative; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
.modal-close:hover { color: var(--text); }
</style>
</head>
<body>

<!-- ══════ Sidebar ══════ -->
<nav id="sidebar">
  <div class="brand"><i class="bi bi-mountains-fill"></i>洞天福地</div>
  <ul class="nav flex-column mt-2">
    <li><a class="nav-link active" data-page="dashboard" href="#" onclick="navigate('dashboard');return false"><i class="bi bi-grid-1x2"></i>仪表盘</a></li>
    <li><a class="nav-link" data-page="resources" href="#" onclick="navigate('resources');return false"><i class="bi bi-collection-play"></i>资源库</a></li>
    <li><a class="nav-link" data-page="shares" href="#" onclick="navigate('shares');return false"><i class="bi bi-share"></i>分享管理</a></li>
    <li><a class="nav-link" data-page="tasks" href="#" onclick="navigate('tasks');return false"><i class="bi bi-arrow-down-circle"></i>导入任务</a></li>
    <li><a class="nav-link" data-page="settings" href="#" onclick="navigate('settings');return false"><i class="bi bi-gear"></i>系统设置</a></li>
  </ul>
  <div class="version" id="sidebar-version">洞天福地 Hidden</div>
</nav>

<!-- ══════ Main Content ══════ -->
<div id="main">

<!-- ── Dashboard ── -->
<div id="page-dashboard" class="page active">
  <div class="page-header">
    <h1><i class="bi bi-grid-1x2 me-2" style="color:var(--blue)"></i>仪表盘</h1>
    <span id="health-dot" style="font-size:.8rem;color:var(--muted)"><span class="spinner"></span> 连接中…</span>
  </div>
  <div class="row g-3 mb-4" id="stats-cards">
    <div class="col-6 col-md-3"><div class="stat-card"><div class="num" id="s-resources">—</div><div class="label"><i class="bi bi-film me-1"></i>收录资源</div></div></div>
    <div class="col-6 col-md-3"><div class="stat-card"><div class="num" id="s-shares-active" style="color:var(--green)">—</div><div class="label"><i class="bi bi-share me-1"></i>活跃分享</div></div></div>
    <div class="col-6 col-md-3"><div class="stat-card"><div class="num" id="s-shares-total">—</div><div class="label"><i class="bi bi-collection me-1"></i>全部分享</div></div></div>
    <div class="col-6 col-md-3"><div class="stat-card"><div class="num" id="s-tasks-pending" style="color:var(--yellow)">—</div><div class="label"><i class="bi bi-hourglass-split me-1"></i>待处理任务</div></div></div>
  </div>
  <!-- Build info bar -->
  <div id="build-info-bar" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:.78rem;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap">
    <span><i class="bi bi-tag me-1"></i>版本 <span id="bi-version" style="color:var(--text)">—</span></span>
    <span><i class="bi bi-git me-1"></i>Commit <span id="bi-commit" style="color:var(--blue);font-family:monospace">—</span></span>
    <span><i class="bi bi-clock me-1"></i>构建时间 <span id="bi-buildtime" style="color:var(--text)">—</span></span>
  </div>
  <div class="card">
    <div class="card-header"><i class="bi bi-clock-history me-2"></i>最近任务</div>
    <div style="padding:0" id="dash-tasks"><div style="padding:20px;color:var(--muted);text-align:center" class="spinner-wrap"><span class="spinner"></span></div></div>
  </div>
</div>

<!-- ── Resources ── -->
<div id="page-resources" class="page">
  <div class="page-header">
    <h1><i class="bi bi-collection-play me-2" style="color:var(--purple)"></i>资源库</h1>
  </div>
  <!-- Search bar -->
  <div class="card mb-4" style="padding:16px">
    <div class="row g-2 align-items-end">
      <div class="col-md-5">
        <label class="form-label">关键词</label>
        <input id="res-kw" class="form-control" placeholder="标题搜索…" onkeyup="if(event.key==='Enter')searchResources()">
      </div>
      <div class="col-md-2">
        <label class="form-label">类型</label>
        <select id="res-type" class="form-select">
          <option value="">全部</option>
          <option value="movie">电影</option>
          <option value="tv">剧集</option>
          <option value="anime">动漫</option>
          <option value="variety">综艺</option>
          <option value="documentary">纪录片</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">年份</label>
        <input id="res-year" class="form-control" type="number" placeholder="如 2024">
      </div>
      <div class="col-md-3">
        <button class="btn-primary" onclick="searchResources()"><i class="bi bi-search me-1"></i>搜索</button>
      </div>
    </div>
  </div>
  <div id="res-total" style="font-size:.8rem;color:var(--muted);margin-bottom:12px"></div>
  <div id="res-grid" class="resource-grid"></div>
  <div class="pager" id="res-pager"></div>
</div>

<!-- ── Shares ── -->
<div id="page-shares" class="page">
  <div class="page-header">
    <h1><i class="bi bi-share me-2" style="color:var(--green)"></i>分享管理</h1>
    <button class="btn-primary" onclick="loadShares()"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button>
  </div>
  <!-- Filter tabs -->
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <button class="btn-sm-ghost" id="sf-all"   onclick="filterShares('')"      style="border-color:var(--blue);color:var(--blue)">全部</button>
    <button class="btn-sm-ghost" id="sf-active"   onclick="filterShares('active')">活跃</button>
    <button class="btn-sm-ghost" id="sf-inactive" onclick="filterShares('inactive')">失效</button>
    <button class="btn-sm-ghost" id="sf-failed"   onclick="filterShares('failed')">损坏</button>
  </div>
  <div class="card">
    <div id="shares-table-wrap" style="overflow-x:auto">
      <table>
        <thead><tr><th>ID</th><th>标题</th><th>分享链接</th><th>文件数</th><th>状态</th><th>最后检查</th><th>操作</th></tr></thead>
        <tbody id="shares-tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="pager" id="shares-pager"></div>
</div>

<!-- ── Tasks ── -->
<div id="page-tasks" class="page">
  <div class="page-header">
    <h1><i class="bi bi-arrow-down-circle me-2" style="color:var(--yellow)"></i>导入任务</h1>
  </div>
  <!-- Import form -->
  <div class="card mb-4" style="padding:16px">
    <div class="card-header" style="margin:-16px -16px 14px;border-radius:7px 7px 0 0"><i class="bi bi-plus-circle me-2"></i>提交新导入</div>
    <div class="row g-2 align-items-end">
      <div class="col-md-8">
        <label class="form-label">115 分享链接</label>
        <input id="task-url" class="form-control" placeholder="https://115.com/s/…  或  输入提取码">
      </div>
      <div class="col-md-2">
        <label class="form-label">优先级</label>
        <select id="task-priority" class="form-select">
          <option value="9">高 (9)</option>
          <option value="5" selected>中 (5)</option>
          <option value="1">低 (1)</option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn-primary" onclick="submitTask()" style="width:100%"><i class="bi bi-send me-1"></i>提交</button>
      </div>
    </div>
  </div>
  <!-- Tasks table -->
  <div class="card">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
      <span><i class="bi bi-list-task me-2"></i>任务列表</span>
      <button class="btn-sm-ghost" onclick="loadTasks()"><i class="bi bi-arrow-clockwise"></i></button>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>ID</th><th>分享链接</th><th>状态</th><th>当前步骤</th><th>提交时间</th><th>操作</th></tr></thead>
        <tbody id="tasks-tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="pager" id="tasks-pager"></div>
</div>

<!-- ── Settings ── -->
<div id="page-settings" class="page">
  <div class="page-header">
    <h1><i class="bi bi-gear me-2" style="color:var(--muted)"></i>系统设置</h1>
    <button class="btn-primary" onclick="saveSettings()"><i class="bi bi-check-lg me-1"></i>保存设置</button>
  </div>
  <div style="font-size:.8rem;color:var(--yellow);background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);border-radius:6px;padding:10px 14px;margin-bottom:20px">
    <i class="bi bi-lightning-charge me-1"></i><strong>Cookie 和 TMDB Key</strong> 保存后立即生效（无需重启）。其余参数下次请求时生效。
  </div>
  <form id="settings-form" onsubmit="return false">

    <div class="settings-group">
      <div class="settings-group-title"><i class="bi bi-cloud me-1"></i>115 账号配置</div>
      <div class="mb-3">
        <label class="form-label">Cookie <span style="color:var(--muted);font-size:.75rem">（留空则使用环境变量）</span></label>
        <textarea id="s-account_115_cookie" class="form-control" rows="3" placeholder="UID=…; CID=…; SEID=…" style="font-family:monospace;font-size:.8rem"></textarea>
      </div>
      <div class="settings-row">
        <div>
          <label class="form-label">成品目录 CID</label>
          <input id="s-account_115_root_folder_id" class="form-control" placeholder="115 成品文件夹 ID">
        </div>
        <div>
          <label class="form-label">临时目录 CID</label>
          <input id="s-account_115_temp_folder_id" class="form-control" placeholder="115 临时文件夹 ID">
        </div>
      </div>
      <div class="settings-row">
        <div>
          <label class="form-label">API 请求间隔 (ms)</label>
          <input id="s-account_115_request_interval_ms" class="form-control" type="number" placeholder="1500">
        </div>
        <div>
          <label class="form-label">失败重试次数</label>
          <input id="s-account_115_retry_times" class="form-control" type="number" placeholder="3">
        </div>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title"><i class="bi bi-film me-1"></i>TMDB 配置</div>
      <div class="settings-row">
        <div>
          <label class="form-label">TMDB API Key</label>
          <input id="s-tmdb_api_key" class="form-control" type="password" placeholder="留空则跳过媒体信息匹配">
        </div>
        <div>
          <label class="form-label">语言</label>
          <select id="s-tmdb_language" class="form-select">
            <option value="zh-CN">zh-CN（简体中文）</option>
            <option value="zh-TW">zh-TW（繁体中文）</option>
            <option value="en-US">en-US（英语）</option>
            <option value="ja-JP">ja-JP（日语）</option>
          </select>
        </div>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title"><i class="bi bi-speedometer2 me-1"></i>分享限速（防风控）</div>
      <div class="settings-row">
        <div>
          <label class="form-label">每分钟最多创建</label>
          <input id="s-share_max_create_per_minute" class="form-control" type="number" placeholder="2">
        </div>
        <div>
          <label class="form-label">每小时最多创建</label>
          <input id="s-share_max_create_per_hour" class="form-control" type="number" placeholder="20">
        </div>
      </div>
      <div class="settings-row">
        <div>
          <label class="form-label">每天最多创建</label>
          <input id="s-share_max_create_per_day" class="form-control" type="number" placeholder="100">
        </div>
        <div>
          <label class="form-label">最小间隔 (秒)</label>
          <input id="s-share_min_interval_secs" class="form-control" type="number" placeholder="30">
        </div>
      </div>
      <div class="settings-row">
        <div>
          <label class="form-label">随机抖动幅度 (秒)</label>
          <input id="s-share_random_jitter_secs" class="form-control" type="number" placeholder="15">
        </div>
        <div></div>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-title"><i class="bi bi-trash me-1"></i>清理规则</div>
      <div class="settings-row">
        <div>
          <label class="form-label">最小视频大小 (MB) <span style="color:var(--muted);font-size:.75rem">小于此值视为广告</span></label>
          <input id="s-clean_min_video_size_mb" class="form-control" type="number" placeholder="100">
        </div>
        <div>
          <label class="form-label">转存前最小剩余空间 (GB)</label>
          <input id="s-transfer_min_free_space_gb" class="form-control" type="number" placeholder="50">
        </div>
      </div>
    </div>

  </form>
</div>

</div><!-- /main -->

<!-- ── Resource Detail Modal ── -->
<div id="res-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()"><i class="bi bi-x-lg"></i></button>
    <div id="res-modal-body"></div>
  </div>
</div>

<!-- ── Toast Container ── -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ══════════════════════════════════════════════
// State
// ══════════════════════════════════════════════
let currentPage = 'dashboard';
let resPage = 0; const resLimit = 24;
let sharesPage = 0; let sharesFilter = ''; const sharesLimit = 20;
let tasksPage = 0; const tasksLimit = 20;
let refreshTimer = null;

// ══════════════════════════════════════════════
// Navigation
// ══════════════════════════════════════════════
function navigate(page) {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  currentPage = page;
  document.querySelectorAll('[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.querySelectorAll('.page').forEach(el => el.classList.toggle('active', el.id === 'page-' + page));
  switch(page) {
    case 'dashboard': loadDashboard(); break;
    case 'resources': loadResources(); break;
    case 'shares':    loadShares();    break;
    case 'tasks':     loadTasks(); startTasksAutoRefresh(); break;
    case 'settings':  loadSettings();  break;
  }
}

// ══════════════════════════════════════════════
// API helper
// ══════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  if (!res.ok) {
    let msg;
    try { const j = await res.json(); msg = j.message || j.error || JSON.stringify(j); } catch { msg = await res.text(); }
    throw new Error(msg || 'HTTP ' + res.status);
  }
  return res.json();
}

// ══════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.innerHTML = (type==='success'?'<i class="bi bi-check-circle me-2" style="color:var(--green)"></i>':
                  type==='error'  ?'<i class="bi bi-exclamation-circle me-2" style="color:var(--red)"></i>':
                                   '<i class="bi bi-info-circle me-2" style="color:var(--blue)"></i>') + escHtml(msg);
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ══════════════════════════════════════════════
// Utils
// ══════════════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
}
function fmtSize(bytes) {
  if (!bytes) return '—';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0, v = bytes;
  while (v > 1024 && i < 4) { v /= 1024; i++; }
  return v.toFixed(1) + ' ' + units[i];
}
function statusBadge(s) {
  const map = { active:'badge-active', inactive:'badge-inactive', failed:'badge-failed', pending:'badge-pending', completed:'badge-completed', organizing:'badge-pending', transferring:'badge-pending', parsing:'badge-pending' };
  const cls = map[s] || 'badge-inactive';
  return `<span class="${cls}">${escHtml(s)}</span>`;
}
function typeLabel(t) {
  const m = { movie:'🎬 电影', tv:'📺 剧集', anime:'🎌 动漫', variety:'🎤 综艺', documentary:'🎥 纪录片', other:'📦 其他' };
  return m[t] || t;
}

// ══════════════════════════════════════════════
// Dashboard
// ══════════════════════════════════════════════
async function loadDashboard() {
  const dot = document.getElementById('health-dot');
  try {
    const [health, stats] = await Promise.all([
      api('GET', '/health'),
      api('GET', '/stats')
    ]);
    dot.innerHTML = `<span style="color:var(--green)">● 健康</span> <span style="color:var(--muted);font-size:.75rem">v${health.version}</span>`;
    document.getElementById('sidebar-version').textContent = 'Hidden v' + health.version;
    // 展示构建信息条
    const bar = document.getElementById('build-info-bar');
    if (bar) {
      bar.style.display = 'flex';
      document.getElementById('bi-version').textContent   = health.version || '—';
      const sha = health.commit || 'dev';
      document.getElementById('bi-commit').textContent    = sha.length > 8 ? sha.slice(0,7) : sha;
      document.getElementById('bi-commit').title          = sha;
      const bt = health.build_time || 'unknown';
      document.getElementById('bi-buildtime').textContent = bt !== 'unknown' ? new Date(bt).toLocaleString('zh-CN') : bt;
    }
    document.getElementById('s-resources').textContent = stats.resources ?? '—';
    document.getElementById('s-shares-active').textContent = stats.shares?.active ?? '—';
    document.getElementById('s-shares-total').textContent = stats.shares?.total ?? '—';
    document.getElementById('s-tasks-pending').textContent = stats.tasks?.pending ?? '—';
    // Recent tasks
    const tasks = await api('GET', '/tasks?limit=8&skip=0');
    const items = tasks.items || tasks;
    const tbody = items.map(t => `
      <tr>
        <td><span style="color:var(--muted);font-size:.8rem">#${t.id}</span></td>
        <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <a href="${escHtml(t.source_share_url)}" target="_blank" style="font-size:.82rem">${escHtml(t.source_share_url)}</a>
        </td>
        <td>${statusBadge(t.status)}</td>
        <td style="color:var(--muted);font-size:.8rem">${escHtml(t.current_step||'—')}</td>
        <td style="color:var(--muted);font-size:.8rem">${fmtDate(t.created_at)}</td>
      </tr>`).join('');
    document.getElementById('dash-tasks').innerHTML = `
      <table style="font-size:.85rem">
        <thead><tr><th>ID</th><th>分享链接</th><th>状态</th><th>步骤</th><th>时间</th></tr></thead>
        <tbody>${tbody || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">暂无任务</td></tr>'}</tbody>
      </table>`;
  } catch(e) {
    dot.innerHTML = `<span style="color:var(--red)">● 离线</span>`;
    document.getElementById('dash-tasks').innerHTML = `<div style="padding:20px;color:var(--red);text-align:center"><i class="bi bi-exclamation-triangle me-1"></i>${escHtml(e.message)}</div>`;
  }
}

// ══════════════════════════════════════════════
// Resources
// ══════════════════════════════════════════════
async function loadResources() {
  resPage = 0;
  await renderResources();
}
async function searchResources() {
  resPage = 0;
  await renderResources();
}
async function renderResources() {
  const kw   = document.getElementById('res-kw').value;
  const type = document.getElementById('res-type').value;
  const year = document.getElementById('res-year').value;
  let qs = `?skip=${resPage * resLimit}&limit=${resLimit}`;
  if (kw)   qs += '&keyword=' + encodeURIComponent(kw);
  if (type) qs += '&type='    + encodeURIComponent(type);
  if (year) qs += '&year='    + encodeURIComponent(year);
  const grid = document.getElementById('res-grid');
  grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)"><span class="spinner"></span></div>';
  try {
    const data = await api('GET', '/resources' + qs);
    const items = data.items || [];
    const total = data.total || 0;
    document.getElementById('res-total').textContent = `共 ${total} 条结果`;
    grid.innerHTML = items.length ? items.map(r => `
      <div class="res-card" onclick="showResource(${r.id})">
        ${r.poster_url
          ? `<img class="res-poster" src="${escHtml(r.poster_url)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="res-poster-ph"${r.poster_url?' style="display:none"':''}><i class="bi bi-film"></i></div>
        <div class="res-info">
          <div class="res-title">${escHtml(r.title)}</div>
          <div class="res-meta">${typeLabel(r.resource_type)}${r.year ? ' · ' + r.year : ''}</div>
        </div>
      </div>`).join('')
      : '<div style="text-align:center;padding:40px;color:var(--muted);grid-column:1/-1">暂无资源，先导入一些分享吧</div>';
    renderPager('res-pager', resPage, Math.ceil(total / resLimit), p => { resPage = p; renderResources(); });
  } catch(e) {
    grid.innerHTML = `<div style="color:var(--red);grid-column:1/-1;padding:20px">${escHtml(e.message)}</div>`;
  }
}
async function showResource(id) {
  const modal = document.getElementById('res-modal');
  const body  = document.getElementById('res-modal-body');
  body.innerHTML = '<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';
  modal.classList.add('open');
  try {
    const [r, shares, files] = await Promise.all([
      api('GET', '/resources/' + id),
      api('GET', '/resources/' + id + '/shares'),
      api('GET', '/resources/' + id + '/files')
    ]);
    const sharesHtml = (shares||[]).map(s => `
      <tr>
        <td><a href="${escHtml(s.share_url)}" target="_blank">${escHtml(s.share_url)}</a></td>
        <td>${statusBadge(s.status)}</td>
        <td>${s.file_count||'—'}</td>
        <td>${fmtDate(s.created_at)}</td>
        <td><button class="btn-sm-ghost" onclick="checkShare(${s.id})">检查</button></td>
      </tr>`).join('');
    const filesHtml = (Array.isArray(files)?files:files.items||[]).map(f => `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">${escHtml(f.file_name||'—')}</td>
        <td style="color:var(--muted);font-size:.8rem">${fmtSize(f.file_size)}</td>
        <td style="color:var(--muted);font-size:.8rem">${escHtml(f.quality||'—')}</td>
      </tr>`).join('');
    body.innerHTML = `
      <div style="display:flex;gap:20px;margin-bottom:16px">
        ${r.poster_url ? `<img src="${escHtml(r.poster_url)}" style="width:100px;border-radius:6px;object-fit:cover;flex-shrink:0" loading="lazy">` : ''}
        <div>
          <h2 style="font-size:1.2rem;margin:0 0 6px">${escHtml(r.title)}</h2>
          ${r.original_title ? `<div style="color:var(--muted);font-size:.85rem;margin-bottom:6px">${escHtml(r.original_title)}</div>` : ''}
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
            ${r.year ? `<span class="badge-completed">${r.year}</span>` : ''}
            <span class="badge-pending">${typeLabel(r.resource_type)}</span>
            ${r.tmdb_id ? `<span style="color:var(--muted);font-size:.75rem">TMDB #${r.tmdb_id}</span>` : ''}
          </div>
          ${r.overview ? `<p style="font-size:.85rem;color:var(--muted);line-height:1.5;max-width:500px">${escHtml(r.overview)}</p>` : ''}
        </div>
      </div>
      ${sharesHtml ? `
      <div style="margin-bottom:14px">
        <div style="font-size:.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">分享链接</div>
        <table><thead><tr><th>URL</th><th>状态</th><th>文件数</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody>${sharesHtml}</tbody></table>
      </div>` : ''}
      ${filesHtml ? `
      <div>
        <div style="font-size:.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">文件列表</div>
        <table><thead><tr><th>文件名</th><th>大小</th><th>画质</th></tr></thead>
        <tbody>${filesHtml}</tbody></table>
      </div>` : ''}`;
  } catch(e) {
    body.innerHTML = `<div style="color:var(--red)">${escHtml(e.message)}</div>`;
  }
}
function closeModal() { document.getElementById('res-modal').classList.remove('open'); }

// ══════════════════════════════════════════════
// Shares
// ══════════════════════════════════════════════
async function loadShares() {
  sharesPage = 0;
  await renderShares();
}
function filterShares(status) {
  sharesFilter = status;
  sharesPage = 0;
  ['all','active','inactive','failed'].forEach(k => {
    const el = document.getElementById('sf-' + (k==='all'?'all':k));
    if (!el) return;
    const match = (k === 'all' && !status) || (k === status);
    el.style.borderColor = match ? 'var(--blue)' : '';
    el.style.color = match ? 'var(--blue)' : '';
  });
  renderShares();
}
async function renderShares() {
  let qs = `?skip=${sharesPage * sharesLimit}&limit=${sharesLimit}`;
  if (sharesFilter) qs += '&status=' + sharesFilter;
  const tbody = document.getElementById('shares-tbody');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px"><span class="spinner"></span></td></tr>';
  try {
    const data = await api('GET', '/shares' + qs);
    const items = data.items || [];
    tbody.innerHTML = items.length ? items.map(s => `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">#${s.id}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(s.share_title||'—')}</td>
        <td><a href="${escHtml(s.share_url)}" target="_blank" style="font-size:.8rem">${escHtml(s.share_url)}</a></td>
        <td style="color:var(--muted);font-size:.8rem">${s.file_count||'—'}</td>
        <td>${statusBadge(s.status)}</td>
        <td style="color:var(--muted);font-size:.8rem">${fmtDate(s.last_checked_at)}</td>
        <td style="white-space:nowrap">
          <button class="btn-sm-ghost" onclick="checkShare(${s.id})" title="验证链接">检查</button>
          ${s.status !== 'active' ? `<button class="btn-sm-ghost" onclick="rebuildShare(${s.id})" title="重建链接" style="margin-left:4px">重建</button>` : ''}
        </td>
      </tr>`).join('')
      : '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">暂无分享记录</td></tr>';
    renderPager('shares-pager', sharesPage, Math.ceil((data.total||0) / sharesLimit), p => { sharesPage = p; renderShares(); });
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" style="color:var(--red);padding:16px">${escHtml(e.message)}</td></tr>`;
  }
}
async function checkShare(id) {
  try {
    toast('正在检查分享 #' + id + '…', 'info');
    const r = await api('POST', '/shares/' + id + '/check');
    toast(`分享 #${id} 状态：${r.status}`, r.alive ? 'success' : 'error');
    if (currentPage === 'shares') renderShares();
  } catch(e) { toast(e.message, 'error'); }
}
async function rebuildShare(id) {
  try {
    toast('正在重建分享 #' + id + '…', 'info');
    const r = await api('POST', '/shares/' + id + '/rebuild');
    toast(`分享 #${id} 重建成功`, 'success');
    if (currentPage === 'shares') renderShares();
  } catch(e) { toast(e.message, 'error'); }
}

// ══════════════════════════════════════════════
// Tasks
// ══════════════════════════════════════════════
async function loadTasks() {
  tasksPage = 0;
  await renderTasks();
}
async function renderTasks() {
  let qs = `?skip=${tasksPage * tasksLimit}&limit=${tasksLimit}`;
  const tbody = document.getElementById('tasks-tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px"><span class="spinner"></span></td></tr>';
  try {
    const data = await api('GET', '/tasks' + qs);
    const items = (data.items || data || []);
    tbody.innerHTML = items.length ? items.map(t => `
      <tr>
        <td style="color:var(--muted);font-size:.8rem">#${t.id}</td>
        <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <a href="${escHtml(t.source_share_url)}" target="_blank" style="font-size:.82rem">${escHtml(t.source_share_url)}</a>
        </td>
        <td>${statusBadge(t.status)}</td>
        <td style="color:var(--muted);font-size:.8rem">${escHtml(t.current_step||'—')}</td>
        <td style="color:var(--muted);font-size:.8rem">${fmtDate(t.created_at)}</td>
        <td style="white-space:nowrap">
          ${t.status==='failed'||t.status==='skipped' ? `<button class="btn-sm-ghost" onclick="retryTask(${t.id})">重试</button>` : ''}
          ${t.status==='pending' ? `<button class="btn-sm-danger" onclick="cancelTask(${t.id})" style="margin-left:4px">取消</button>` : ''}
          ${t.error_message ? `<span title="${escHtml(t.error_message)}" style="margin-left:6px;cursor:help;color:var(--red)"><i class="bi bi-exclamation-circle"></i></span>` : ''}
        </td>
      </tr>`).join('')
      : '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">暂无任务，去提交一个吧</td></tr>';
    renderPager('tasks-pager', tasksPage, Math.ceil(((data.total)||items.length) / tasksLimit), p => { tasksPage = p; renderTasks(); });
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--red);padding:16px">${escHtml(e.message)}</td></tr>`;
  }
}
async function submitTask() {
  const url = document.getElementById('task-url').value.trim();
  const priority = parseInt(document.getElementById('task-priority').value);
  if (!url) { toast('请输入 115 分享链接', 'error'); return; }
  try {
    await api('POST', '/tasks', { share_url: url, priority });
    document.getElementById('task-url').value = '';
    toast('任务已提交', 'success');
    await renderTasks();
  } catch(e) { toast(e.message, 'error'); }
}
async function retryTask(id) {
  try {
    await api('POST', '/tasks/' + id + '/retry');
    toast('任务 #' + id + ' 已重新加入队列', 'success');
    await renderTasks();
  } catch(e) { toast(e.message, 'error'); }
}
async function cancelTask(id) {
  try {
    await api('POST', '/tasks/' + id + '/cancel');
    toast('任务 #' + id + ' 已取消', 'info');
    await renderTasks();
  } catch(e) { toast(e.message, 'error'); }
}
function startTasksAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (currentPage === 'tasks') renderTasks();
    else clearInterval(refreshTimer);
  }, 8000);
}

// ══════════════════════════════════════════════
// Settings
// ══════════════════════════════════════════════
async function loadSettings() {
  try {
    const rows = await api('GET', '/settings');
    rows.forEach(row => {
      const el = document.getElementById('s-' + row.key);
      if (el) el.value = row.value;
    });
  } catch(e) { toast('加载设置失败：' + e.message, 'error'); }
}
async function saveSettings() {
  const keys = [
    'account_115_cookie','account_115_root_folder_id','account_115_temp_folder_id',
    'account_115_request_interval_ms','account_115_retry_times',
    'tmdb_api_key','tmdb_language',
    'share_max_create_per_minute','share_max_create_per_hour','share_max_create_per_day',
    'share_min_interval_secs','share_random_jitter_secs',
    'clean_min_video_size_mb','transfer_min_free_space_gb'
  ];
  const settings = {};
  keys.forEach(k => {
    const el = document.getElementById('s-' + k);
    if (el) settings[k] = el.value;
  });
  try {
    const r = await api('PUT', '/settings', { settings });
    toast(`已保存 ${r.updated} 个配置项`, 'success');
  } catch(e) { toast('保存失败：' + e.message, 'error'); }
}

// ══════════════════════════════════════════════
// Pagination
// ══════════════════════════════════════════════
function renderPager(containerId, page, totalPages, onPage) {
  const el = document.getElementById(containerId);
  if (!el || totalPages <= 1) { if (el) el.innerHTML = ''; return; }
  el.innerHTML = `
    <button ${page===0?'disabled':''} onclick="(${onPage.toString()})(${page-1})"><i class="bi bi-chevron-left"></i></button>
    <span class="page-info">第 ${page+1} / ${totalPages} 页</span>
    <button ${page>=totalPages-1?'disabled':''} onclick="(${onPage.toString()})(${page+1})"><i class="bi bi-chevron-right"></i></button>`;
}

// ══════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => loadDashboard());
</script>
</body>
</html>
