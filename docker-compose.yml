version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hidden-postgres
    environment:
      POSTGRES_DB: hidden
      POSTGRES_USER: hidden
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hidden_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hidden -d hidden"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hidden-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Hidden API 服务 ─────────────────────────────────────────
  hidden:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hidden-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库
      DATABASE_URL: postgres://hidden:${POSTGRES_PASSWORD:-hidden_secret}@postgres:5432/hidden
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      # 服务器
      HOST: 0.0.0.0
      PORT: 8080
      APP_ENV: production
      # 115 账号（可留空，启动后在 WebUI → 系统设置 中配置，保存即时生效）
      ACCOUNT_115_COOKIE: ${ACCOUNT_115_COOKIE:-}
      ACCOUNT_115_ROOT_FOLDER_ID: ${ACCOUNT_115_ROOT_FOLDER_ID:-}
      ACCOUNT_115_TEMP_FOLDER_ID: ${ACCOUNT_115_TEMP_FOLDER_ID:-}
      # TMDB（可留空，在 WebUI 中配置）
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"   # WebUI: http://localhost:8080
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
