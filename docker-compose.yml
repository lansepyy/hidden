version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hidden-postgres
    environment:
      POSTGRES_DB: hidden
      POSTGRES_USER: hidden
      POSTGRES_PASSWORD: hidden_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hidden -d hidden"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hidden-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Hidden API 服务 ─────────────────────────────────────────
  hidden:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hidden-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hidden:hidden_secret@postgres:5432/hidden
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 8080
      APP_ENV: production
      JWT_SECRET: hidden-jwt-secret-please-change
    ports:
      - "8080:8080"   # WebUI: http://localhost:8080
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
